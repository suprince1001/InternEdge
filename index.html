<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InternEdge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-circle one"></div>
    <div class="bg-circle two"></div>

    <div class="main-container">
        <div class="login-box">

            <h1>InternEdge</h1>
            <p>Build your future with internships & jobs</p>

            <!-- Toggle -->

        <div class="toggle-box">
            <button type="button" id="studentBtn" class="active">Student</button>
            <button type="button" id="companyBtn">Company</button>
        </div>

        <!-- Login Form -->

        <form id="loginForm" action="login.php" method="POST">
        <input 
            type="email" 
            name="email" 
            placeholder="Email Address" 
            required
        >
        <input 
            type="password" 
            name="password" 
            placeholder="Password" 
            required
        >
        <button type="submit" class="login-btn">Login</button>
        </form>
        
        <!-- Register Button -->
        <a id="registerLink" href="register.html">
            <button type="button" class="register-btn">Register</button>
        </a>


        </div>
    </div>

    <!-- Bottom Navbar -->
    <nav class="bottom-nav">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Jobs</a>
        <a href="#">Contact</a>
    </nav>

    <script src="script.js"></script>
    
    <div id="popupModal" class="popup-modal">
        <div class="popup-box">
            <div class="popup-icon" id="popupIcon"></div>
            <h2 id="popupTitle"></h2>
            <p id="popupMessage"></p>
        </div>
    </div>
</body>
</html>
